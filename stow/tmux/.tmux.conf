# ~/.tmux.conf

# ── Prefix: Ctrl-a (easier reach than Ctrl-b) ────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Sane defaults ────────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g history-limit 100000
set -s escape-time 0
set -g focus-events on

# True color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-256color:Tc"

# ── Splits use current path ──────────────────────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ── Vim-style pane nav ───────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes (HJKL repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Reload config ────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "tmux config reloaded"

# ── Vim copy mode ────────────────────────────────────────────────────
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ── Status bar — minimal Catppuccin ──────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'

set -g status-left-length 40
set -g status-left '#[fg=#1e1e2e,bg=#cba6f7,bold] #S #[fg=#cba6f7,bg=#1e1e2e]  '

set -g status-right-length 80
set -g status-right '#[fg=#a6e3a1] %H:%M #[fg=#f9e2af] %d-%b #[fg=#89b4fa] #h '

setw -g window-status-format         '#[fg=#6c7086] #I:#W '
setw -g window-status-current-format '#[fg=#f5e0dc,bold] #I:#W '

set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#cba6f7'

# ── Plugins (TPM) ────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save every 15min
set -g @plugin 'tmux-plugins/tmux-yank'        # better clipboard

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run '~/.tmux/plugins/tpm/tpm'
